name: soutify
description: "Soutify — accessible speech interface (enrollment, server ASR, hybrid TTS)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  record: ^6.0.0
  dio: ^5.7.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0
  just_audio: ^0.10.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#0F6380"
  image: "assets/images/Soutify.PNG"
  android_12:
    color: "#0F6380"
    image: "assets/images/Soutify.PNG"

flutter:
  uses-material-design: true
  assets:
    - assets/images/Soutify.PNG
    - assets/personalization/personalization_words.json
    - assets/personalization/images/
