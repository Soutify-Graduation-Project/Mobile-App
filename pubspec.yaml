name: soutify
description: "Soutify — accessible speech interface (enrollment, server ASR, hybrid TTS)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  record: ^6.0.0
  dio: ^5.7.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0
  just_audio: ^0.10.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Team 12 - Soutify.PNG
    - assets/cat.jpg
    - assets/dog.jpg
    - assets/elephant.jpg
    - assets/lion.jpg
    - assets/mango.jpg
    - assets/strawberry.jpg
